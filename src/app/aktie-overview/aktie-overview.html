<section class="karte">
    <h3>{{ aktie.name }}</h3>
    <p class="kurs">{{ aktie.aktuellerKurs }} €</p>
    <p class="aenderung" [class.positiv]="aktie.aenderung >= 0" [class.negativ]="aktie.aenderung < 0">
        {{ aktie.aenderung >= 0 ? '+' : '' }}{{ aktie.aenderung }} %
    </p>
    <p class="kaufpreis">Kaufpreis: {{ boughtAktie.kaufPreis }} €</p>
</section>
