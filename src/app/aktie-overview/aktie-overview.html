<a class="position-row" [routerLink]="['/aktie', boughtAktie.id]">
    <div class="position-avatar">{{ aktie.name.charAt(0) }}</div>

    <div class="position-main">
        <span class="position-name">{{ aktie.name }}</span>
        <span class="position-meta">{{ boughtAktie.anzahl }} Stk. · Ø {{ boughtAktie.kaufPreis | number:'1.2-2' }} €</span>
    </div>

    <div class="position-values">
        <span class="position-kurs">{{ aktie.aktuellerKurs | number:'1.2-2' }} €</span>
        <span class="position-aenderung" [class.positiv]="aktie.aenderung >= 0" [class.negativ]="aktie.aenderung < 0">
            {{ aktie.aenderung >= 0 ? '+' : '' }}{{ aktie.aenderung | number:'1.2-2' }} %
        </span>
    </div>
</a>
